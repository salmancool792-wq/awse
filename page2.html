<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account On Hold</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:
        linear-gradient(rgba(0,0,0,.45), rgba(0,0,0,.45)),
        url("background.jpg") no-repeat center center;
    background-size:cover;
    background-attachment:fixed;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:420px;
    background:#fff;
    padding:40px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,.3);
}

.icon{
    font-size:60px;
    margin-bottom:15px;
}

h1{
    color:#d32f2f;
    margin-bottom:15px;
}

p{
    color:#555;
    font-size:17px;
    line-height:1.6;
    margin-bottom:30px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:#fff;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1d4ed8;
}

.footer{
    margin-top:20px;
    font-size:14px;
    color:#777;
}
</style>

</head>
<body>

<div class="container">

    <div class="icon">⚠️</div>

    <h1>Account On Hold</h1>

    <p>
        Due to Suspicious activities, your account has been placed on hold.
        Please contact our Customer Support team to verify your account and restore access.
    </p>

    <button onclick="window.location.href='tel:+18887911332'">
        Contact Now +1(888) 791-1332
    </button>

    <div class="footer">
        We apologize for the inconvenience.
    </div>

</div>

</body>
</html>
