<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device Activation</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        linear-gradient(rgba(10,15,25,.55), rgba(10,15,25,.55)),
        url("background.jpg") center center/cover no-repeat fixed;
}

.container{
    width:420px;
    background:rgba(255,255,255,.96);
    border-radius:18px;
    padding:40px;
    text-align:center;
    box-shadow:0 25px 60px rgba(0,0,0,.45);
}

.logo{
    width:75px;
    height:75px;
    border-radius:50%;
    background:#2563eb;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    margin:0 auto 20px;
}

h1{
    color:#1d4ed8;
    font-size:30px;
    margin-bottom:12px;
}

.subtitle{
    color:#666;
    line-height:1.6;
    margin-bottom:28px;
}

input{
    width:100%;
    padding:16px;
    font-size:18px;
    text-align:center;
    border:2px solid #d8d8d8;
    border-radius:10px;
    outline:none;
    letter-spacing:2px;
    margin-bottom:18px;
    transition:.25s;
}

input:focus{
    border-color:#2563eb;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:#fff;
    font-size:18px;
    font-weight:bold;
    cursor:not-allowed;
    opacity:.5;
    transition:.25s;
}

button:enabled{
    opacity:1;
    cursor:pointer;
}

button:hover:enabled{
    background:#1d4ed8;
}

.info{
    margin-top:25px;
    padding:15px;
    background:#f3f6fb;
    border-radius:10px;
    color:#555;
    font-size:14px;
    line-height:1.5;
}

.footer{
    margin-top:18px;
    color:#777;
    font-size:13px;
}

a{
    text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">📺</div>

    <h1>Device Activation</h1>

    <p class="subtitle">
        Enter the activation code displayed on your TV or streaming device to continue.
    </p>

    <form action="page2.html" method="GET">

        <input
            id="activationCode"
            type="text"
            name="code"
            placeholder="Enter Activation Code"
            maxlength="18"
            required>

        <button id="activateBtn" type="submit" disabled>
            Activate Device
        </button>

    </form>

    <div class="info">
        Make sure the activation code matches the one displayed on your device screen.
    </div>

    <div class="footer">
        Need help? Contact Customer Support
    </div>

</div>

<script>
const input = document.getElementById("activationCode");
const button = document.getElementById("activateBtn");

input.addEventListener("input", function(){
    button.disabled = this.value.trim().length === 0;
});
</script>

</body>
</html>
