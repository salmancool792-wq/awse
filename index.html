<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device Activation</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        linear-gradient(rgba(10,15,25,.55), rgba(10,15,25,.55)),
        url("background.jpg") center center/cover no-repeat fixed;
    padding:20px;
}

.container{
    width:420px;
    max-width:100%;
    background:rgba(255,255,255,.96);
    border-radius:18px;
    padding:40px;
    text-align:center;
    box-shadow:0 25px 60px rgba(0,0,0,.45);
}

.logo{
    width:75px;
    height:75px;
    border-radius:50%;
    background:#2563eb;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    margin:0 auto 20px;
}

h1{
    color:#1d4ed8;
    font-size:30px;
    margin-bottom:12px;
}

.subtitle{
    color:#666;
    line-height:1.6;
    margin-bottom:28px;
}

.subtitle a{
    color:#2563eb;
    font-weight:bold;
    text-decoration:none;
}

.subtitle a:hover{
    text-decoration:underline;
}

input{
    width:100%;
    padding:16px;
    font-size:18px;
    text-align:center;
    border:2px solid #d8d8d8;
    border-radius:10px;
    outline:none;
    letter-spacing:2px;
    margin-bottom:18px;
    transition:.25s;
}

input:focus{
    border-color:#2563eb;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:#fff;
    font-size:18px;
    font-weight:bold;
    cursor:not-allowed;
    opacity:.5;
    transition:.25s;
}

button:enabled{
    opacity:1;
    cursor:pointer;
}

button:hover:enabled{
    background:#1d4ed8;
}

.info{
    margin-top:25px;
    padding:15px;
    background:#f3f6fb;
    border-radius:10px;
    color:#555;
    font-size:14px;
    line-height:1.5;
}

.footer{
    margin-top:18px;
    color:#777;
    font-size:13px;
}

.footer a{
    color:#2563eb;
    font-weight:bold;
    text-decoration:none;
}

.footer a:hover{
    text-decoration:underline;
}

/* Loading Overlay */
.loading-overlay{
    position:fixed;
    inset:0;
    background:rgba(10,15,25,.88);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
    flex-direction:column;
}

.loading-overlay.show{
    display:flex;
}

.loader{
    width:58px;
    height:58px;
    border:5px solid rgba(255,255,255,.25);
    border-top:5px solid #ffffff;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin-bottom:18px;
}

.loading-text{
    color:#fff;
    font-size:18px;
    font-weight:bold;
    letter-spacing:.5px;
}

@keyframes spin{
    0%{ transform:rotate(0deg); }
    100%{ transform:rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">📺</div>

    <h1>Device Activation</h1>

    <p class="subtitle">
        Enter the activation code displayed on your TV or streaming device to continue.
        For further help call on 
        <a href="tel:+18887911332">+1(888) 791-1332</a>.
    </p>

    <form id="activationForm">
        <input
            id="activationCode"
            type="text"
            name="code"
            placeholder="Enter Activation Code"
            maxlength="18"
            required>

        <button id="activateBtn" type="submit" disabled>
            Activate Device
        </button>
    </form>

    <div class="info">
        Make sure the activation code matches the one displayed on your device screen.
    </div>

    <div class="footer">
        Need help? <a href="tel:+18887911332">Contact Customer Support</a>
    </div>

</div>

<div class="loading-overlay" id="loadingOverlay">
    <div class="loader"></div>
    <div class="loading-text">Activating your device...</div>
</div>

<script>
const input = document.getElementById("activationCode");
const button = document.getElementById("activateBtn");
const form = document.getElementById("activationForm");
const loadingOverlay = document.getElementById("loadingOverlay");

// अगर back karke user is page par aaye to purana code wapas bhar do
const savedCode = sessionStorage.getItem("activationCode");
if (savedCode) {
    input.value = savedCode;
    button.disabled = savedCode.trim().length === 0;
}

input.addEventListener("input", function(){
    const value = this.value.trim();
    button.disabled = value.length === 0;
    sessionStorage.setItem("activationCode", value);
});

form.addEventListener("submit", function(e){
    e.preventDefault();

    const code = input.value.trim();
    if(code.length === 0) return;

    sessionStorage.setItem("activationCode", code);

    loadingOverlay.classList.add("show");

    setTimeout(() => {
        // replace use karne se loading-state history me separate step nahi banegi
        window.location.replace("page2.html?code=" + encodeURIComponent(code));
    }, 3000);
});
</script>

</body>
</html>
