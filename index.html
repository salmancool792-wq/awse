<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Activation</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:400px;
    background:#fff;
    padding:40px;
    border-radius:15px;
    box-shadow:0 15px 40px rgba(0,0,0,.3);
    text-align:center;
}

.logo{
    font-size:45px;
    margin-bottom:10px;
}

h1{
    color:#1e3a8a;
    margin-bottom:15px;
}

p{
    color:#555;
    margin-bottom:25px;
    line-height:1.5;
}

input{
    width:100%;
    padding:15px;
    font-size:18px;
    text-align:center;
    border:2px solid #ccc;
    border-radius:8px;
    letter-spacing:3px;
    outline:none;
    margin-bottom:20px;
}

input:focus{
    border-color:#2563eb;
}

button{
    width:100%;
    padding:15px;
    background:#2563eb;
    color:#fff;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1d4ed8;
}

.footer{
    margin-top:25px;
    color:#777;
    font-size:14px;
}
</style>

</head>
<body>

<div class="container">

<div class="logo">📺</div>

<h1>Enter Your Code</h1>

<p>
Enter the activation code displayed on your TV to continue.
</p>

<form action="page2.html" method="GET">

<input
type="text"
name="code"
placeholder="Enter Activation Code"
maxlength="18"
required>

<button type="submit">
Activate TV
</button>

</form>

<div class="footer">
Need help? Contact Support +1(800) 000-1000.
</div>

</div>

</body>
</html>
